<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa simple con marcador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 12px;
            background: #f4f4f4;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        iframe {
            width: 100%;
            height: 350px;
            border: 0;
            border-radius: 12px;
        }

        .info {
            margin-top: 12px;
            text-align: left;
            font-size: 14px;
        }

        .coords {
            font-weight: bold;
            color: #0b5ed7;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: #0b5ed7;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>Mapa con marcador</h2>

        <iframe id="mapa"
                loading="lazy"
                allowfullscreen
                src="">
        </iframe>

        <div class="info">
            <div>
                <strong>Latitud:</strong>
                <span class="coords" id="latitud"></span>
            </div>

            <div>
                <strong>Longitud:</strong>
                <span class="coords" id="longitud"></span>
            </div>
        </div>

        <button onclick="usarUbicacionActual()">
            Usar ubicación actual
        </button>

    </div>

    <script>

        /*
          Coordenadas iniciales:
          Santiago Centro
        */

        let latitud = -33.4489;
        let longitud = -70.6693;

        actualizarMapa();

        function actualizarMapa() {

            document.getElementById("latitud").innerText = latitud;
            document.getElementById("longitud").innerText = longitud;

            const url = `
            https://maps.google.com/maps?q=${latitud},${longitud}&z=16&output=embed
          `;

            document.getElementById("mapa").src = url;
        }

        function usarUbicacionActual() {

            if (!navigator.geolocation) {
                alert("Tu navegador no soporta geolocalización.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {

                    latitud = position.coords.latitude;
                    longitud = position.coords.longitude;

                    actualizarMapa();
                },

                (error) => {
                    console.error(error);
                    alert("No se pudo obtener la ubicación.");
                },

                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

    </script>

</body>
</html>
