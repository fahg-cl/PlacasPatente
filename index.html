<html lang="es">

<head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="icons/icon.png">

    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Patentes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f12;
            color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 52px;
            background: #0b0f12;
            border-bottom: 1px solid #25313b;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
        }

        .hamburger-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: 1px solid #26313a;
            background: #12181e;
            color: white;
            font-size: 24px;
        }

        .header-title {
            font-weight: bold;
            color: #f4f6f8;
        }

        .side-menu {
            position: fixed;
            top: 52px;
            left: -230px;
            width: 220px;
            height: calc(100vh - 52px);
            background: #12181e;
            border-right: 1px solid #25313b;
            z-index: 999;
            padding: 12px;

        }

        h2,

        video {
            width: 100%;
            max-width: 320px;
            max-height: 220px;

        .control-grid {

        .control-grid button {
            min-height: 92px;

        #resultado,

        }

        }

        #mapaPatentes {

        .registro {

        }

        .patente {
            font-size: 18px;

        .export-btn {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            border: 1px solid #56d364;
            background: linear-gradient(145deg, #3fb950, #238636);
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header class="app-header">
        <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
        <div class="header-title">Lector de Patentes</div>
    </header>

    <nav id="menuLateral" class="side-menu">
        <button onclick="mostrarPagina('pagina1')">📷 Lectura</button>
        <button onclick="mostrarPagina('pagina2')">🗺️ Mapa</button>
        <button onclick="mostrarPagina('pagina3')">🗂️ Historial</button>
    </nav>

    <main>

        <!-- PAGINA 1 -->
        <section id="pagina1" class="pagina activa">

            <h2>Lector de Patentes</h2>

            <video id="video" autoplay playsinline></video>

            <div id="resultado">Resultado...</div>

            <div class="preview-container">
                <div class="preview-box">
                    <h3>Detección</h3>
                    <canvas id="canvasPreview"></canvas>
                </div>

                <div class="preview-box">
                    <h3>Recorte patente</h3>
                    <canvas id="canvasRecorte"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3>Datos detectados</h3>
                <div id="datosDetectados">Sin datos detectados.</div>
            </div>

            <div class="control-grid">

                <button id="btnCamara" onclick="toggleCamara()">
                    <div class="btn-icon">📷</div>
                    <div class="btn-text">Activar cámara</div>
                </button>

                <button onclick="capturarDetectarYLeer()" class="btn-primary">
                    <div class="btn-icon">📸</div>
                    <div class="btn-text">Capturar y leer</div>
                </button>

                <button id="btnAuto" onclick="toggleCapturaAutomatica()">
                    <div class="btn-icon">▶️</div>
                    <div class="btn-text">Iniciar auto</div>
                </button>


            </div>

            <div class="panel interval-panel">
                <div class="interval-icon">⏱️</div>

                <select id="intervaloCaptura">
                    <option value="3000">Cada 3 seg.</option>
                    <option value="5000">Cada 5 seg.</option>
                    <option value="10000">Cada 10 seg.</option>
                    <option value="15000">Cada 15 seg.</option>
                    <option value="20000">Cada 20 seg.</option>
                    <option value="30000">Cada 30 seg.</option>
                    <option value="60000">Cada 60 seg.</option>
                </select>
            </div>

        </section>

        <!-- PAGINA 2 -->
        <section id="pagina2" class="pagina">
            <h2>Mapa de patentes detectadas</h2>

            <div class="panel">
                <div id="mapaPatentes"></div>
            </div>
        </section>

        <!-- PAGINA 3 -->
        <section id="pagina3" class="pagina">

            <h2>Historial</h2>

            <div id="estado">Cargando modelo...</div>

        <div class="control-grid">
            <button class="btn-primary" onclick="exportarHistoricoMensual()">
                <div class="btn-icon">📤</div>
                <div class="btn-text">Exportar JSON</div>
            </button>

            <button class="btn-danger" onclick="confirmarBorrarHistoria()">
                <div class="btn-icon">🗑️</div>
                <div class="btn-text">Borrar historia</div>
            </button>
        </div>

            <div class="panel">
                <h3>Listado de historial</h3>
                <div id="historial">Sin registros.</div>
            </div>

        </section>

    </main>

    <canvas id="canvasOriginal" style="display:none;"></canvas>
    <canvas id="canvasModelo" style="display:none;"></canvas>

<script>
    ort.env.wasm.wasmPaths =
        "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/";

    const video = document.getElementById("video");
    const canvasOriginal = document.getElementById("canvasOriginal");
    const canvasModelo = document.getElementById("canvasModelo");
    const canvasPreview = document.getElementById("canvasPreview");
    const canvasRecorte = document.getElementById("canvasRecorte");

    const estado = document.getElementById("estado");
    const resultado = document.getElementById("resultado");
    const historialDiv = document.getElementById("historial");
    const datosDetectadosDiv = document.getElementById("datosDetectados");

    const MODEL_PATH = "./model/license_plate.onnx";
    const MODEL_SIZE = 640;
    const CONFIDENCE_THRESHOLD = 0.35;
    const STORAGE_KEY = "historial_patentes_yolo";
    const WORKER_URL = "https://guardar-historico-patentes.fahg76.workers.dev/";

    let session = null;
    let historial = cargarHistorialDesdeLocalStorage();
    let capturaAutomaticaTimer = null;
    let mapaPatentes = null;
    let marcadoresPatentes = [];

    const btnAuto = document.getElementById("btnAuto");

    let streamCamara = null;
    const btnCamara = document.getElementById("btnCamara");

    actualizarHistorial();
    cargarModelo();

    window.addEventListener("load", () => {
        inicializarMapa();
    });

    function toggleMenu() {
        document.getElementById("menuLateral").classList.toggle("abierto");
    }

    function mostrarPagina(idPagina) {
        document.querySelectorAll(".pagina").forEach(p => p.classList.remove("activa"));
        document.getElementById(idPagina).classList.add("activa");
        document.getElementById("menuLateral").classList.remove("abierto");

        if (idPagina === "pagina2" && mapaPatentes) {
            setTimeout(() => mapaPatentes.invalidateSize(), 300);
        }
    }

    async function cargarModelo() {
        estado.innerText = "Verificando modelo...";

        try {
            const check = await fetch(MODEL_PATH);

            if (!check.ok) {
                throw new Error(`Modelo no encontrado HTTP ${check.status}`);
            }

            const modeloBuffer = await check.arrayBuffer();

            estado.innerText = "Cargando modelo ONNX...";

            session = await ort.InferenceSession.create(modeloBuffer, {
                executionProviders: ["wasm"]
            });

            estado.innerHTML = `✅ Modelo listo`;
            resultado.innerText = "Modelo listo.";

        } catch (error) {
            console.error(error);
            estado.innerHTML = `❌ Error modelo<br>${error.message}`;
            resultado.innerText = "Error al cargar modelo.";
        }
    }

    async function toggleCamara() {
        if (streamCamara) {
            detenerCamara();
        } else {
            await iniciarCamara();
        }
    }

    async function iniciarCamara() {
        try {
            streamCamara = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            });

            video.srcObject = streamCamara;
            resultado.innerText = "Cámara activa.";

            btnCamara.innerHTML = `
                <div class="btn-icon">⏹️</div>
                <div class="btn-text">Desactivar cámara</div>
            `;
            btnCamara.classList.add("auto-activo");

        } catch (error) {
            resultado.innerText = "Error al activar cámara.";
            console.error("Error cámara:", error);
        }
    }

    function detenerCamara() {
        if (capturaAutomaticaTimer) {
            detenerCapturaAutomatica();
        }

        if (streamCamara) {
            streamCamara.getTracks().forEach(track => track.stop());
            streamCamara = null;
        }

        video.srcObject = null;
        resultado.innerText = "Cámara desactivada.";

        btnCamara.innerHTML = `
            <div class="btn-icon">📷</div>
            <div class="btn-text">Activar cámara</div>
        `;
        btnCamara.classList.remove("auto-activo");
    }

    async function capturarDetectarYLeer() {
        if (!session) {
            resultado.innerText = "Modelo no cargado.";
            return;
        }

        if (!video.videoWidth || !video.videoHeight) {
            resultado.innerText = "Activa la cámara.";
            return;
        }

        resultado.innerText = "Detectando...";

        const ctx = canvasOriginal.getContext("2d");
        canvasOriginal.width = video.videoWidth;
        canvasOriginal.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvasOriginal.width, canvasOriginal.height);

        const deteccion = await detectarPatenteYOLO(canvasOriginal);

        if (!deteccion) {
            resultado.innerText = "No detectada.";
            return;
        }

        dibujarDeteccion(canvasOriginal, deteccion);
        recortarPatente(canvasOriginal, deteccion);

        resultado.innerText = "Leyendo...";

        try {
            const lectura = await Tesseract.recognize(
                canvasRecorte.toDataURL("image/png"),
                "eng",
                {
                    tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
                }
            );

            const texto = lectura.data.text
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, "");

            const patente = extraerPatente(texto);

            if (!patente) {
                resultado.innerText = "Texto no válido.";
                return;
            }

            resultado.innerText = `Detectada: ${patente}`;
            await registrarLectura(patente);

        } catch (error) {
            resultado.innerText = "Error OCR.";
            console.error(error);
        }
    }

    async function detectarPatenteYOLO(canvas) {
        const inputTensor = prepararImagenParaYOLO(canvas);
        const inputName = session.inputNames[0];

        const outputs = await session.run({
            [inputName]: inputTensor
        });

        const outputName = session.outputNames[0];
        const output = outputs[outputName];

        return procesarSalidaYOLO(output, canvas.width, canvas.height);
    }

    function prepararImagenParaYOLO(canvas) {
        canvasModelo.width = MODEL_SIZE;
        canvasModelo.height = MODEL_SIZE;

        const ctx = canvasModelo.getContext("2d");
        ctx.drawImage(canvas, 0, 0, MODEL_SIZE, MODEL_SIZE);

        const imageData = ctx.getImageData(0, 0, MODEL_SIZE, MODEL_SIZE);
        const data = imageData.data;

        const red = [];
        const green = [];
        const blue = [];

        for (let i = 0; i < data.length; i += 4) {
            red.push(data[i] / 255);
            green.push(data[i + 1] / 255);
            blue.push(data[i + 2] / 255);
        }

        const input = new Float32Array([...red, ...green, ...blue]);

        return new ort.Tensor("float32", input, [1, 3, MODEL_SIZE, MODEL_SIZE]);
    }

    function procesarSalidaYOLO(output, originalWidth, originalHeight) {
        const data = output.data;
        const dims = output.dims;

        let mejor = null;
        let mejorConfianza = 0;

        const cantidad = dims[2] || dims[1];

        for (let i = 0; i < cantidad; i++) {
            const x = data[i];
            const y = data[cantidad + i];
            const w = data[cantidad * 2 + i];
            const h = data[cantidad * 3 + i];
            const confianza = data[cantidad * 4 + i];

            if (confianza > CONFIDENCE_THRESHOLD && confianza > mejorConfianza) {
                mejorConfianza = confianza;

                const escalaX = originalWidth / MODEL_SIZE;
                const escalaY = originalHeight / MODEL_SIZE;

                mejor = {
                    x: (x - w / 2) * escalaX,
                    y: (y - h / 2) * escalaY,
                    width: w * escalaX,
                    height: h * escalaY,
                    confidence: confianza
                };
            }
        }

        return mejor;
    }

    function dibujarDeteccion(canvas, rect) {
        canvasPreview.width = canvas.width;
        canvasPreview.height = canvas.height;

        const ctx = canvasPreview.getContext("2d");
        ctx.drawImage(canvas, 0, 0);

        ctx.lineWidth = 6;
        ctx.strokeStyle = "#38e66b";
        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);

        ctx.font = "28px Arial";
        ctx.fillStyle = "#38e66b";
        ctx.fillText(
            `Patente ${(rect.confidence * 100).toFixed(1)}%`,
            rect.x,
            Math.max(rect.y - 10, 30)
        );
    }

    function recortarPatente(canvas, rect) {
        const margen = 16;

        const x = Math.max(rect.x - margen, 0);
        const y = Math.max(rect.y - margen, 0);
        const width = Math.min(rect.width + margen * 2, canvas.width - x);
        const height = Math.min(rect.height + margen * 2, canvas.height - y);

        canvasRecorte.width = width;
        canvasRecorte.height = height;

        const ctx = canvasRecorte.getContext("2d");

        ctx.drawImage(
            canvas,
            x,
            y,
            width,
            height,
            0,
            0,
            width,
            height
        );

        mejorarImagenOCR(ctx, width, height);
    }

    function mejorarImagenOCR(ctx, width, height) {
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            const gris = data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11;
            const valor = gris > 130 ? 255 : 0;

            data[i] = valor;
            data[i + 1] = valor;
            data[i + 2] = valor;
        }

        ctx.putImageData(imageData, 0, 0);
    }

    function extraerPatente(texto) {
        const patrones = [
            /[A-Z]{4}[0-9]{2}/,
            /[A-Z]{2}[0-9]{4}/
        ];

        for (const patron of patrones) {
            const match = texto.match(patron);
            if (match) return match[0];
        }

        return null;
    }

    async function registrarLectura(patente) {
        const fechaHora = new Date();

        let ubicacion = {
            latitud: null,
            longitud: null,
            precision: null,
            disponible: false
        };

        try {
            ubicacion = await obtenerUbicacion();
        } catch (error) {
            console.warn("No se pudo obtener ubicación:", error);
        }

        const registro = {
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
            patente,
            fechaHoraISO: fechaHora.toISOString(),
            fechaHoraLocal: fechaHora.toLocaleString("es-CL"),
            latitud: ubicacion.latitud,
            longitud: ubicacion.longitud,
            precision: ubicacion.precision,
            ubicacionDisponible: ubicacion.disponible
        };

        historial.unshift(registro);
        guardarHistorialEnLocalStorage();
        actualizarHistorial();
        actualizarDatosDetectados(registro);
        agregarMarcadorPatente(registro);
    }

    function obtenerUbicacion() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject("Geolocalización no soportada.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => {
                    resolve({
                        latitud: position.coords.latitude,
                        longitud: position.coords.longitude,
                        precision: position.coords.accuracy,
                        disponible: true
                    });
                },
                error => reject(error),
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        });
    }

    function actualizarDatosDetectados(registro) {
        datosDetectadosDiv.innerHTML = `
            <div><strong>Patente:</strong> <span class="patente">${registro.patente}</span></div>
            <div><strong>Fecha/Hora:</strong> ${registro.fechaHoraLocal}</div>
            <div><strong>Latitud:</strong> ${registro.latitud ?? "No disponible"}</div>
            <div><strong>Longitud:</strong> ${registro.longitud ?? "No disponible"}</div>
            <div><strong>Precisión:</strong> ${registro.precision ? Math.round(registro.precision) + " metros" : "No disponible"}</div>
        `;
    }

    function inicializarMapa() {
        mapaPatentes = L.map("mapaPatentes").setView([-33.4489, -70.6693], 12);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "© OpenStreetMap"
        }).addTo(mapaPatentes);

        cargarMarcadoresDesdeHistorial();
    }

    function agregarMarcadorPatente(registro) {
        if (!mapaPatentes) return;
        if (!registro.latitud || !registro.longitud) return;

        const marcador = L.marker([registro.latitud, registro.longitud])
            .addTo(mapaPatentes)
            .bindPopup(`
                <strong>Patente:</strong> ${registro.patente}<br>
                <strong>Fecha/Hora:</strong> ${registro.fechaHoraLocal}<br>
                <strong>Precisión:</strong> ${registro.precision ? Math.round(registro.precision) + " metros" : "No disponible"}
            `);

        marcador.bindTooltip(registro.patente, {
            permanent: false,
            direction: "top"
        });

        marcadoresPatentes.push(marcador);
        mapaPatentes.setView([registro.latitud, registro.longitud], 16);
    }

    function cargarMarcadoresDesdeHistorial() {
        historial.forEach(registro => {
            agregarMarcadorPatente(registro);
        });
    }

    function limpiarMarcadoresMapa() {
        if (!mapaPatentes) return;

        marcadoresPatentes.forEach(marcador => {
            mapaPatentes.removeLayer(marcador);
        });

        marcadoresPatentes = [];
    }

    function guardarHistorialEnLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(historial));
    }

    function cargarHistorialDesdeLocalStorage() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch (error) {
            console.error("Error leyendo localStorage:", error);
            return [];
        }
    }

    function actualizarHistorial() {
        if (historial.length === 0) {
            historialDiv.innerHTML = "Sin registros.";
            return;
        }

        historialDiv.innerHTML = historial.map((r, index) => `
            <div class="registro">
                <div class="patente">${index + 1}. ${r.patente}</div>
                <div><strong>Fecha/Hora:</strong> ${r.fechaHoraLocal}</div>
                <div><strong>Latitud:</strong> ${r.latitud ?? "No disponible"}</div>
                <div><strong>Longitud:</strong> ${r.longitud ?? "No disponible"}</div>
                <div><strong>Precisión:</strong> ${r.precision ? Math.round(r.precision) + " metros" : "No disponible"}</div>
            </div>
        `).join("");
    }

        function confirmarBorrarHistoria() {
            const confirmar = confirm(
                "¿Estás seguro de que deseas borrar todo el historial local? Esta acción no se puede deshacer."
            );

            if (confirmar) {
                borrarHistoria();
            }
        }

        function borrarHistoria() {
            historial = [];
            localStorage.removeItem(STORAGE_KEY);
            actualizarHistorial();
            limpiarMarcadoresMapa();
            datosDetectadosDiv.innerHTML = "Sin datos detectados.";
            resultado.innerText = "Historia borrada.";
        }

    function toggleCapturaAutomatica() {
        if (capturaAutomaticaTimer) {
            detenerCapturaAutomatica();
        } else {
            iniciarCapturaAutomatica();
        }
    }

    function iniciarCapturaAutomatica() {
        const intervalo = Number(document.getElementById("intervaloCaptura").value);

        resultado.innerText = `Auto cada ${intervalo / 1000} seg.`;

        btnAuto.innerHTML = `
            <div class="btn-icon">⏹️</div>
            <div class="btn-text">Detener auto</div>
        `;

        btnAuto.classList.add("auto-activo");

        capturarDetectarYLeer();

        capturaAutomaticaTimer = setInterval(() => {
            capturarDetectarYLeer();
        }, intervalo);
    }

    function detenerCapturaAutomatica() {
        clearInterval(capturaAutomaticaTimer);
        capturaAutomaticaTimer = null;

        btnAuto.innerHTML = `
            <div class="btn-icon">▶️</div>
            <div class="btn-text">Iniciar auto</div>
        `;

        btnAuto.classList.remove("auto-activo");
        resultado.innerText = "Auto detenido.";
    }

    async function exportarHistoricoMensual() {
        try {
            if (!historial || historial.length === 0) {
                resultado.innerText = "No hay registros.";
                return;
            }

            const ahora = new Date();
            const yyyy = ahora.getFullYear();
            const mm = String(ahora.getMonth() + 1).padStart(2, "0");
            const periodo = `${yyyy}-${mm}`;

            const registrosDelMes = historial.filter(r => {
                const fecha = new Date(r.fechaHoraISO);
                return fecha.getFullYear() === yyyy &&
                    fecha.getMonth() + 1 === Number(mm);
            });

            if (registrosDelMes.length === 0) {
                resultado.innerText = "Sin registros del mes.";
                return;
            }

            const historico = {
                periodo,
                totalRegistros: registrosDelMes.length,
                fechaExportacion: new Date().toISOString(),
                registros: registrosDelMes
            };

            resultado.innerText = "Exportando...";

            const respuesta = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(historico)
            });

            const data = await respuesta.json();

            if (!respuesta.ok || !data.ok) {
                console.error(data);
                resultado.innerText = `Error exportación: ${respuesta.status}`;
                return;
            }

            resultado.innerText = `Exportado: ${periodo}.json`;

        } catch (error) {
            console.error("Error exportando histórico:", error);
            resultado.innerText = "Error conexión Worker.";
        }
    }
</script>
