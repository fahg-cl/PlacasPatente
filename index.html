<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Lector Patentes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="apple-touch-icon" href="icons/icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Patentes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f12">

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f12;
            color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 52px;
            background: #0b0f12;
            border-bottom: 1px solid #25313b;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
        }

        .hamburger-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: 1px solid #26313a;
            background: #12181e;
            color: white;
            font-size: 24px;
        }

        .header-title {
            font-weight: bold;
            color: #f4f6f8;
        }

        .side-menu {
            position: fixed;
            top: 52px;
            left: -230px;
            width: 220px;
            height: calc(100vh - 52px);
            background: #12181e;
            border-right: 1px solid #25313b;
            z-index: 999;
            padding: 12px;
            box-sizing: border-box;
            transition: left 0.25s ease;
        }

            .side-menu.abierto {
                left: 0;
            }

            .side-menu button {
                width: 100%;
                margin-bottom: 10px;
                padding: 14px;
                border-radius: 14px;
                border: 1px solid #26313a;
                background: #1b2229;
                color: white;
                text-align: left;
                font-size: 15px;
            }

        main {
            padding: 6px 4px 16px;
        }

        .pagina {
            display: none;
            text-align: center;
        }

            .pagina.activa {
                display: block;
            }

        h2,
        h3 {
            margin: 8px 0;
        }

        video {
            width: 100%;
            max-width: 320px;
            max-height: 220px;
            object-fit: cover;
            border-radius: 18px;
            background: #000;
            border: 1px solid #2b3944;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
        }

        canvas {
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            background: #000;
            margin-bottom: 8px;
        }

        .preview-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: nowrap;
            max-width: 100%;
            margin: auto;
        }

        .preview-box {
            flex: 1;
            min-width: 0;
            background: #12181e;
            border: 1px solid #242f38;
            border-radius: 16px;
            padding: 8px;
        }

            .preview-box canvas {
                width: 100%;
                max-width: 180px;
                max-height: 140px;
                object-fit: contain;
            }

        .panel {
            max-width: 100%;
            margin: 8px auto;
            padding: 12px;
            background: #12181e;
            border: 1px solid #242f38;
            border-radius: 18px;
            text-align: left;
            font-size: 13px;
        }

        .control-grid {
            margin: 12px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

            .control-grid button {
                min-height: 92px;
                border-radius: 22px;
                border: 1px solid #26313a;
                background: linear-gradient(145deg, #1b2229, #11171c);
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

        .btn-icon {
            font-size: 26px;
        }

        .btn-text {
            font-size: 13px;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(145deg, #43c85b, #20883b) !important;
        }

        .btn-danger {
            color: #ff6767 !important;
        }

        .auto-activo {
            background: linear-gradient(145deg, #ff5252, #9f1d2a) !important;
        }

        .interval-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .interval-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #1a2128;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .interval-panel select {
            flex: 1;
            height: 48px;
            border-radius: 14px;
            border: 1px solid #2d3943;
            background: #151b21;
            color: white;
            padding: 0 14px;
        }

        #resultado,
        #estado {
            max-width: 320px;
            margin: 8px auto;
            padding: 10px;
            background: #12181e;
            border: 1px solid #26313a;
            border-radius: 14px;
            text-align: center;
            font-weight: bold;
        }

        #resultado {
            color: #5ef17b;
        }

        #mapaPatentes {
            width: 100%;
            height: 420px;
            border-radius: 16px;
        }

        .registro {
            border-bottom: 1px solid #25313b;
            padding: 10px 0;
        }

        .patente {
            font-size: 18px;
            font-weight: bold;
            color: #5ef17b;
        }

        .export-btn {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            border: 1px solid #56d364;
            background: linear-gradient(145deg, #3fb950, #238636);
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header class="app-header">
        <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
        <div class="header-title">Lector de Patentes</div>
    </header>

    <nav id="menuLateral" class="side-menu">
        <button onclick="mostrarPagina('pagina1')">📷 Lectura</button>
        <button onclick="mostrarPagina('pagina2')">🗺️ Mapa</button>
        <button onclick="mostrarPagina('pagina3')">🗂️ Historial</button>
    </nav>

    <main>

        <!-- PAGINA 1 -->
        <section id="pagina1" class="pagina activa">

            <h2>Lector de Patentes</h2>

            <video id="video" autoplay playsinline></video>

            <div id="resultado">Resultado...</div>

            <div class="preview-container">
                <div class="preview-box">
                    <h3>Detección</h3>
                    <canvas id="canvasPreview"></canvas>
                </div>

                <div class="preview-box">
                    <h3>Recorte patente</h3>
                    <canvas id="canvasRecorte"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3>Datos detectados</h3>
                <div id="datosDetectados">Sin datos detectados.</div>
            </div>

            <div class="control-grid">

                <button onclick="iniciarCamara()">
                    <div class="btn-icon">📷</div>
                    <div class="btn-text">Activar cámara</div>
                </button>

                <button onclick="capturarDetectarYLeer()" class="btn-primary">
                    <div class="btn-icon">📸</div>
                    <div class="btn-text">Capturar y leer</div>
                </button>

                <button id="btnAuto" onclick="toggleCapturaAutomatica()">
                    <div class="btn-icon">▶️</div>
                    <div class="btn-text">Iniciar auto</div>
                </button>

                <button onclick="borrarHistoria()" class="btn-danger">
                    <div class="btn-icon">🗑️</div>
                    <div class="btn-text">Borrar historia</div>
                </button>

            </div>

            <div class="panel interval-panel">
                <div class="interval-icon">⏱️</div>

                <select id="intervaloCaptura">
                    <option value="3000">Cada 3 seg.</option>
                    <option value="5000">Cada 5 seg.</option>
                    <option value="10000">Cada 10 seg.</option>
                    <option value="15000">Cada 15 seg.</option>
                    <option value="20000">Cada 20 seg.</option>
                    <option value="30000">Cada 30 seg.</option>
                    <option value="60000">Cada 60 seg.</option>
                </select>
            </div>

        </section>

        <!-- PAGINA 2 -->
        <section id="pagina2" class="pagina">
            <h2>Mapa de patentes detectadas</h2>

            <div class="panel">
                <div id="mapaPatentes"></div>
            </div>
        </section>

        <!-- PAGINA 3 -->
        <section id="pagina3" class="pagina">

            <h2>Historial</h2>

            <div id="estado">Cargando modelo...</div>

            <button class="export-btn" onclick="exportarHistoricoMensual()">
                Exportar histórico JSON
            </button>

            <div class="panel">
                <h3>Listado de historial</h3>
                <div id="historial">Sin registros.</div>
            </div>

        </section>

    </main>

    <canvas id="canvasOriginal" style="display:none;"></canvas>
    <canvas id="canvasModelo" style="display:none;"></canvas>

    <script>

        ort.env.wasm.wasmPaths =
            "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/";

        const video = document.getElementById("video");
        const canvasOriginal = document.getElementById("canvasOriginal");
        const canvasModelo = document.getElementById("canvasModelo");
        const canvasPreview = document.getElementById("canvasPreview");
        const canvasRecorte = document.getElementById("canvasRecorte");

        const estado = document.getElementById("estado");
        const resultado = document.getElementById("resultado");
        const historialDiv = document.getElementById("historial");
        const datosDetectadosDiv = document.getElementById("datosDetectados");

        const MODEL_PATH = "./model/license_plate.onnx";
        const MODEL_SIZE = 640;
        const CONFIDENCE_THRESHOLD = 0.35;

        let session = null;
        let historial = [];
        let capturaAutomaticaTimer = null;

        let mapaPatentes = null;
        let marcadoresPatentes = [];

        const btnAuto = document.getElementById("btnAuto");

        cargarModelo();
        inicializarMapa();

        function toggleMenu() {
            document.getElementById("menuLateral")
                .classList.toggle("abierto");
        }

        function mostrarPagina(idPagina) {

            document.querySelectorAll(".pagina")
                .forEach(p => p.classList.remove("activa"));

            document.getElementById(idPagina)
                .classList.add("activa");

            document.getElementById("menuLateral")
                .classList.remove("abierto");

            if (idPagina === "pagina2" && mapaPatentes) {
                setTimeout(() => {
                    mapaPatentes.invalidateSize();
                }, 300);
            }
        }

        async function cargarModelo() {

            estado.innerText = "Verificando modelo...";

            try {

                const check = await fetch(MODEL_PATH);

                if (!check.ok) {
                    throw new Error(
                        `Modelo no encontrado HTTP ${check.status}`
                    );
                }

                const modeloBuffer = await check.arrayBuffer();

                estado.innerText = "Cargando modelo ONNX...";

                session = await ort.InferenceSession.create(
                    modeloBuffer,
                    {
                        executionProviders: ["wasm"]
                    }
                );

                estado.innerHTML =
                    `✅ Modelo listo`;

            } catch (error) {

                console.error(error);

                estado.innerHTML =
                    `❌ Error modelo<br>${error.message}`;
            }
        }

        function inicializarMapa() {

            mapaPatentes =
                L.map("mapaPatentes")
                    .setView([-33.4489, -70.6693], 12);

            L.tileLayer(
                "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
                    maxZoom: 19,
                    attribution: "© OpenStreetMap"
                }
            ).addTo(mapaPatentes);
        }

    </script>

</body>

</html>
